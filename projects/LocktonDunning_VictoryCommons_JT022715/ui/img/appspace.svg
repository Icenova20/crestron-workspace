<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C0F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3C71;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad1)" />
  
  <!-- Connecting Lines -->
  <path d="M50 25 L20 75 L80 75 Z" stroke="white" stroke-width="6" fill="none" stroke-linejoin="round" />
  
  <!-- Nodes (Dots) -->
  <circle cx="50" cy="25" r="8" fill="white" />
  <circle cx="20" cy="75" r="8" fill="white" />
  <circle cx="80" cy="75" r="8" fill="white" />
